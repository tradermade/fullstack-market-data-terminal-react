services:
  fx-dashboard:
    build:
      context: .
      args:
        VITE_LOGO_URL: ${VITE_LOGO_URL:-}
        VITE_BRAND_NAME: ${VITE_BRAND_NAME:-}
        VITE_BRAND_BADGE: ${VITE_BRAND_BADGE:-}
        VITE_PROXY_WS_URL: ${VITE_PROXY_WS_URL:-}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped
